[toolchain]
package_manager = "yarn"

[features]
resolution = true
skip-lint = false

[programs.localnet]
stake_to_curate = "UfaPFjHzepp91cEzmfoAd2b7bMVWoB37wuPRa8vy9Su"

[programs.devnet]
stake_to_curate = "UfaPFjHzepp91cEzmfoAd2b7bMVWoB37wuPRa8vy9Su"

[registry]
url = "https://api.apr.dev"

[provider]
cluster = "localnet"
wallet = "~/.config/solana/id.json"

[scripts]
# On-chain integration tests need `target/deploy/stake_to_curate.so` (SBF build). In
# minimal toolchains, run: `cargo test -p stake_to_curate --lib` for Rust unit tests.
test = "cargo test -p stake_to_curate --lib -- --nocapture"
